# General settings and modular configuration imports
[general]
import = []
live_config_reload = true

# Terminal window customization
[window]
decorations = "full"
opacity = 0.95
blur = true
dynamic_title = true

[window.dimensions]
columns = 120
lines = 35

[window.padding]
x = 12
y = 12

# Typography settings (Requires restarting Alacritty to apply changes)
[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

# Terminal scrollback history
[scrolling]
history = 10000
multiplier = 3

# Hardware cursor behaviors
[cursor]
blink_interval = 750
unfocused_hollow = true

[cursor.style]
shape = "Block"
blinking = "On"

# Integrated Tokyo Night color scheme 
[colors.primary]
background = "0x1a1b26"
foreground = "0xa9b1d6"

[colors.normal]
black   = "0x32344a"
red     = "0xf7768e"
green   = "0x9ece6a"
yellow  = "0xe0af68"
blue    = "0x7aa2f7"
magenta = "0xbb9af7"
cyan    = "0x7dcfff"
white   = "0xa9b1d6"

[colors.bright]
black   = "0x444b6a"
red     = "0xff7a93"
green   = "0xb9f27c"
yellow  = "0xff9e64"
blue    = "0x7da6ff"
magenta = "0xbb9af7"
cyan    = "0x0db9d7"
white   = "0xacb0d0"
